<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小组件预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            gap: 24px;
        }
        h1 {
            color: #fff;
            font-size: 20px;
            font-weight: 500;
        }
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .controls label {
            color: #aaa;
            font-size: 14px;
        }
        .controls select, .controls input {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a3e;
            color: #fff;
            font-size: 14px;
        }
        .preview-area {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #333;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
        }
        .widget-frame {
            overflow: hidden;
        }
        .editor-section {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .editor-section label {
            color: #aaa;
            font-size: 13px;
        }
        .editor-section textarea {
            width: 100%;
            height: 300px;
            background: #2a2a3e;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: vertical;
        }
        .btn {
            padding: 10px 24px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            align-self: flex-start;
        }
        .btn:hover { background: #4f46e5; }
        .size-info {
            color: #666;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🎡 小组件预览工具</h1>

    <div class="controls">
        <label>尺寸：</label>
        <select id="sizeSelect">
            <option value="2x2">2×2</option>
            <option value="2x3">2×3</option>
            <option value="4x4">4×4</option>
        </select>
        <label>壁纸：</label>
        <input type="color" id="bgColor" value="#f5f5f5">
        <input type="url" id="bgImage" placeholder="壁纸图片URL（可选）" style="width:200px;">
    </div>

    <div class="preview-area" id="previewArea">
        <div class="widget-frame" id="widgetFrame"></div>
    </div>
    <div class="size-info" id="sizeInfo"></div>

    <div class="editor-section">
        <label>粘贴组件 JSON：</label>
        <textarea id="jsonInput" placeholder='把组件JSON粘贴到这里...'></textarea>
        <button class="btn" onclick="renderWidget()">渲染预览</button>
    </div>

    <script>
        const SIZES = {
            '2x2': { w: 176, h: 176 },
            '2x3': { w: 264, h: 176 },
            '4x4': { w: 352, h: 352 }
        };

        const sizeSelect = document.getElementById('sizeSelect');
        const bgColor = document.getElementById('bgColor');
        const bgImage = document.getElementById('bgImage');
        const previewArea = document.getElementById('previewArea');
        const widgetFrame = document.getElementById('widgetFrame');
        const sizeInfo = document.getElementById('sizeInfo');

        function updatePreviewSize() {
            const size = SIZES[sizeSelect.value];
            const scale = 2;
            const w = size.w * scale;
            const h = size.h * scale;
            previewArea.style.width = (w + 40) + 'px';
            previewArea.style.height = (h + 40) + 'px';
            widgetFrame.style.width = w + 'px';
            widgetFrame.style.height = h + 'px';
            sizeInfo.textContent = `预览尺寸: ${w}×${h}px (${scale}x缩放)`;
        }

        function updateBackground() {
            const url = bgImage.value.trim();
            if (url) {
                previewArea.style.background = `url('${url}') center/cover`;
            } else {
                previewArea.style.background = bgColor.value;
            }
        }

        function renderWidget() {
            const raw = document.getElementById('jsonInput').value.trim();
            if (!raw) return;

            let config;
            try {
                config = JSON.parse(raw);
            } catch (e) {
                alert('JSON 格式错误: ' + e.message);
                return;
            }

            // 设置尺寸
            if (config.size) {
                sizeSelect.value = config.size;
                updatePreviewSize();
            }

            const uid = config.id || 'widget-preview';

            // 替换变量
            let html = config.html || '';
            let css = config.css || '';
            const vars = config.defaultVars || {};

            html = html.replace(/\{\{id\}\}/g, uid);
            css = css.replace(/\{\{id\}\}/g, uid);

            for (const [key, val] of Object.entries(vars)) {
                const regex = new RegExp(`\\{\\{${key}\\}\\}`, 'g');
                html = html.replace(regex, val);
                css = css.replace(regex, val);
            }

            // 移除旧样式
            const oldStyle = document.getElementById('widget-style');
            if (oldStyle) oldStyle.remove();

            // 注入样式
            const style = document.createElement('style');
            style.id = 'widget-style';
            style.textContent = css;
            document.head.appendChild(style);

            // 注入HTML
            widgetFrame.innerHTML = html;
        }

        sizeSelect.addEventListener('change', updatePreviewSize);
        bgColor.addEventListener('input', updateBackground);
        bgImage.addEventListener('input', updateBackground);

        updatePreviewSize();
        updateBackground();
    </script>
</body>
</html>
